groups:

- name: ObservabilityAlerts

  rules:

  - alert: ServiceDown

    expr: up == 0

    for: 2m

    labels:
      severity: critical

  - alert: HighErrorRate

    expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 5

    for: 5m

    labels:
      severity: critical

  - alert: HighLatency

    expr: rate(http_server_requests_seconds_sum[5m])
      /
      rate(http_server_requests_seconds_count[5m]) > 2

    for: 5m

    labels:
      severity: warning
