global:

  scrape_interval: 15s

rule_files:

  - "/etc/prometheus/rules/microservices-alert-rules.yml"

scrape_configs:

  - job_name: "customer-service"

    static_configs:

      - targets:
          - "customer-service:8081"

  - job_name: "order-service"

    static_configs:

      - targets:
          - "order-service:8082"

  - job_name: "payment-service"

    static_configs:

      - targets:
          - "payment-service:8083"

  - job_name: "inventory-service"

    static_configs:

      - targets:
          - "inventory-service:8084"
