global:

  scrape_interval: 15s

rule_files:

  - "/etc/prometheus/rules/environment-alert-rules.yml"

scrape_configs:

  - job_name: "development"

    static_configs:

      - targets:
          - "dev-server:9100"

  - job_name: "testing"

    static_configs:

      - targets:
          - "test-server:9100"

  - job_name: "staging"

    static_configs:

      - targets:
          - "staging-server:9100"

  - job_name: "production"

    static_configs:

      - targets:
          - "prod-server:9100"
