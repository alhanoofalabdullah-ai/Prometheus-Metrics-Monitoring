groups:

- name: EnvironmentAlerts

  rules:

  - alert: EnvironmentDown

    expr: up == 0

    for: 2m

    labels:
      severity: critical

  - alert: HighCPUUsage

    expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80

    for: 5m

    labels:
      severity: warning

  - alert: HighMemoryUsage

    expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85

    for: 5m

    labels:
      severity: warning

  - alert: ProductionIncident

    expr: up{job="production"} == 0

    for: 1m

    labels:
      severity: critical
