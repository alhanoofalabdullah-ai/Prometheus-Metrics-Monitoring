groups:

- name: APIAlerts

  rules:

  - alert: APIDown

    expr: up{job="api-monitoring"} == 0

    for: 1m

    labels:
      severity: critical

  - alert: HighResponseTime

    expr: rate(http_server_requests_seconds_sum[5m]) /
          rate(http_server_requests_seconds_count[5m]) > 2

    for: 5m

    labels:
      severity: critical

  - alert: HighErrorRate

    expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 5

    for: 2m

    labels:
      severity: critical

  - alert: HighRequestVolume

    expr: rate(http_server_requests_seconds_count[1m]) > 1000

    for: 2m

    labels:
      severity: warning
