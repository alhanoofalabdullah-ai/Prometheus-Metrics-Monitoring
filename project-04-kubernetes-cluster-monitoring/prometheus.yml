global:

  scrape_interval: 15s

rule_files:

  - "/etc/prometheus/rules/kubernetes-alert-rules.yml"

scrape_configs:

  - job_name: "kubernetes-nodes"

    static_configs:

      - targets:
          - "node-exporter:9100"

  - job_name: "kube-state-metrics"

    static_configs:

      - targets:
          - "kube-state-metrics:8080"
