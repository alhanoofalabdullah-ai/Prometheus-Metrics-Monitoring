global:

  scrape_interval: 15s

rule_files:

  - "/etc/prometheus/rules/database-alert-rules.yml"

scrape_configs:

  - job_name: "mysql"

    static_configs:

      - targets:
          - "mysql-exporter:9104"

  - job_name: "postgres"

    static_configs:

      - targets:
          - "postgres-exporter:9187"
