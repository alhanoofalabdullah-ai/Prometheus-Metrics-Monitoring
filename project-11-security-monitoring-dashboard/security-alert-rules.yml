groups:

- name: SecurityAlerts

  rules:

  - alert: ExcessiveFailedLogins

    expr: failed_login_attempts_total > 10

    for: 2m

    labels:
      severity: critical

  - alert: BruteForceAttack

    expr: failed_login_attempts_total > 50

    for: 1m

    labels:
      severity: critical

  - alert: UnauthorizedAdminAccess

    expr: privileged_access_events_total > 0

    for: 1m

    labels:
      severity: critical

  - alert: SuspiciousProcessDetected

    expr: suspicious_process_count > 0

    for: 1m

    labels:
      severity: critical
