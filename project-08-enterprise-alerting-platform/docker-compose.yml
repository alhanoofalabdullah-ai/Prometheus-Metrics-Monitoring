version: '3'

services:

  prometheus:
    image: prom/prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./rules:/etc/prometheus/rules

  alertmanager:
    image: prom/alertmanager

    ports:
      - "9093:9093"

    volumes:
      - ./alertmanager:/etc/alertmanager

  grafana:
    image: grafana/grafana

    ports:
      - "3000:3000"
