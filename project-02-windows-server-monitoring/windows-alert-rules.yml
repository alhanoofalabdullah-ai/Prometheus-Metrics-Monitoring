groups:

- name: WindowsAlerts

  rules:

  - alert: HighCPUUsage

    expr: 100 - (avg by(instance)(rate(windows_cpu_time_total{mode="idle"}[5m])) * 100) > 85

    for: 2m

    labels:
      severity: critical

  - alert: HighMemoryUsage

    expr: ((windows_cs_physical_memory_bytes - windows_os_physical_memory_free_bytes) / windows_cs_physical_memory_bytes) * 100 > 90

    for: 2m

    labels:
      severity: warning

  - alert: LowDiskSpace

    expr: (windows_logical_disk_free_bytes/windows_logical_disk_size_bytes) * 100 < 10

    for: 2m

    labels:
      severity: critical
