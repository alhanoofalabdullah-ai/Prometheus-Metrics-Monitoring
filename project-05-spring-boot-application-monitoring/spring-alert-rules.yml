groups:

- name: SpringBootAlerts

  rules:

  - alert: ApplicationDown

    expr: up{job="spring-boot-app"} == 0

    for: 1m

    labels:
      severity: critical

  - alert: HighJVMMemory

    expr: jvm_memory_used_bytes > 1000000000

    for: 5m

    labels:
      severity: warning

  - alert: HighHttpErrors

    expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 5

    for: 2m

    labels:
      severity: critical
