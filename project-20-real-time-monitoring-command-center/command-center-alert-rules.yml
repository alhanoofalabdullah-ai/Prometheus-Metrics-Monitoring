groups:

- name: CommandCenterAlerts

  rules:

  - alert: CriticalServiceFailure

    expr: up == 0

    for: 1m

    labels:
      severity: critical

  - alert: HighCPUUsage

    expr: avg(rate(node_cpu_seconds_total[5m])) > 0.85

    for: 5m

    labels:
      severity: warning

  - alert: SecurityIncident

    expr: security_incidents_total > 0

    for: 1m

    labels:
      severity: critical

  - alert: BusinessKPIBreach

    expr: business_risk_score > 80

    for: 5m

    labels:
      severity: warning
