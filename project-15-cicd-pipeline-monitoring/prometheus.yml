global:

  scrape_interval: 15s

rule_files:

  - "/etc/prometheus/rules/cicd-alert-rules.yml"

scrape_configs:

  - job_name: "jenkins"

    static_configs:

      - targets:
          - "jenkins:8080"

  - job_name: "github-actions"

    static_configs:

      - targets:
          - "github-actions-exporter:9091"

  - job_name: "gitlab-ci"

    static_configs:

      - targets:
          - "gitlab-ci-exporter:9092"
