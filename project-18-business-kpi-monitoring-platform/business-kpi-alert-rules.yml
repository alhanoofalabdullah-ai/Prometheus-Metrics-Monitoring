groups:

- name: BusinessKPIAlerts

  rules:

  - alert: RevenueDecline

    expr: revenue_growth_rate < 0

    for: 30m

    labels:
      severity: critical

  - alert: CustomerChurnIncrease

    expr: customer_churn_rate > 5

    for: 30m

    labels:
      severity: warning

  - alert: OperationalEfficiencyDrop

    expr: operational_efficiency_score < 90

    for: 30m

    labels:
      severity: warning

  - alert: BusinessRiskDetected

    expr: business_risk_score > 80

    for: 15m

    labels:
      severity: critical
