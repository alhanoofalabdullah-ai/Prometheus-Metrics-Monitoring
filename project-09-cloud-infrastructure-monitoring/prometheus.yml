global:

  scrape_interval: 15s

rule_files:

  - "/etc/prometheus/rules/cloud-alert-rules.yml"

scrape_configs:

  - job_name: "aws"

    static_configs:

      - targets:
          - "aws-exporter:9106"

  - job_name: "azure"

    static_configs:

      - targets:
          - "azure-exporter:9276"

  - job_name: "gcp"

    static_configs:

      - targets:
          - "gcp-exporter:9255"
