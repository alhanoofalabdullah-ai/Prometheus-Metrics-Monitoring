global:

  scrape_interval: 15s

rule_files:

  - "/etc/prometheus/rules/network-alert-rules.yml"

scrape_configs:

  - job_name: "network-devices"

    static_configs:

      - targets:

        - 192.168.1.1
        - 192.168.1.2
        - 192.168.1.3

  - job_name: "blackbox"

    metrics_path: /probe

    params:
      module: [icmp]

    static_configs:

      - targets:

        - 8.8.8.8
        - 1.1.1.1
